<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Whaticket - Panel Principal</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #60a5fa 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .hero-section {
      padding: 80px 0;
    }
    .card {
      border: none;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.95);
    }
    .menu-item {
      display: block;
      padding: 20px;
      margin-bottom: 15px;
      text-decoration: none;
      color: #495057;
      border-radius: 15px;
      transition: all 0.3s ease;
      border: 2px solid transparent;
    }
    .menu-item:hover {
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
      color: white;
      transform: translateY(-5px);
      box-shadow: 0 15px 30px rgba(30, 58, 138, 0.2);
      border-color: rgba(255,255,255,0.3);
    }
    .menu-item i {
      margin-right: 10px;
      font-size: 1.2em;
    }
    .hero-title {
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="container-fluid">
    <div class="row justify-content-center hero-section">
      <div class="col-lg-8 col-xl-6">
        <div class="text-center mb-5">
          <h1 class="display-4 hero-title">Whaticket</h1>
          <p class="lead text-white">Sistema de Gestión Integral</p>
        </div>

        <div class="card p-4">
          <div class="card-body">
            <h2 class="card-title text-center mb-4">
              <i class="bi bi-grid-3x3-gap-fill text-primary"></i> Panel Principal
            </h2>

            <div class="row g-3">
              <div class="col-md-6">
                <a class="menu-item d-flex align-items-center justify-content-center" href="tickets/index.html">
                  <i class="bi bi-ticket-perforated-fill"></i>
                  Gestión de Tickets
                </a>
              </div>
              <div class="col-md-6">
                <a class="menu-item d-flex align-items-center justify-content-center" href="reportes/index.html">
                  <i class="bi bi-graph-up"></i>
                  Reportes
                </a>
              </div>
              <div class="col-md-6">
                <a class="menu-item d-flex align-items-center justify-content-center" href="admin/index.html">
                  <i class="bi bi-gear-fill"></i>
                  Panel Administrativo
                </a>
              </div>
              <div class="col-md-6">
                <a class="menu-item d-flex align-items-center justify-content-center" href="chatbot/index.html">
                  <i class="bi bi-robot"></i>
                  Chatbot & Base de Conocimiento
                </a>
              </div>
              <div class="col-12">
                <a class="menu-item d-flex align-items-center justify-content-center" href="users/login.html">
                  <i class="bi bi-people-fill"></i>
                  Gestión de Usuarios
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
