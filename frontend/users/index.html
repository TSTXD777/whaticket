<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registrar Usuario - Whaticket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #60a5fa 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .register-card {
            max-width: 450px;
            width: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }
        .card-header {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            border-radius: 20px 20px 0 0 !important;
            border: none;
        }
        .btn-custom {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            border: none;
            border-radius: 25px;
            padding: 12px;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(30, 58, 138, 0.3);
            color: white;
        }
        .form-control:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.25);
        }
        .input-group-text {
            background: #f8f9fa;
            border-color: #dee2e6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="register-card">
                    <div class="card-header text-center py-4">
                        <h4 class="mb-0">
                            <i class="bi bi-person-plus me-2"></i>
                            Registrar Usuario
                        </h4>
                        <p class="mb-0 small opacity-75">Sistema de Gestión Whaticket</p>
                    </div>
                    <div class="card-body p-4">
                        <form id="formRegistro">
                            <div class="mb-3">
                                <label for="nombre" class="form-label">
                                    <i class="bi bi-person me-1"></i>Nombre completo
                                </label>
                                <input type="text" id="nombre" class="form-control form-control-lg"
                                       placeholder="Ingrese el nombre completo" required>
                            </div>

                            <div class="mb-3">
                                <label for="correo" class="form-label">
                                    <i class="bi bi-envelope me-1"></i>Correo electrónico
                                </label>
                                <input type="email" id="correo" class="form-control form-control-lg"
                                       placeholder="ejemplo@gmail.com" required>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">
                                    <i class="bi bi-lock me-1"></i>Contraseña
                                </label>
                                <input type="password" id="password" class="form-control form-control-lg"
                                       placeholder="Mínimo 6 caracteres" required minlength="6">
                            </div>

                            <div class="mb-4">
                                <label for="rol" class="form-label">
                                    <i class="bi bi-person-badge me-1"></i>Rol del sistema
                                </label>
                                <select id="rol" class="form-select form-select-lg" required>
                                    <option value="" disabled selected>Seleccione un rol</option>
                                    <option value="admin">Administrador</option>
                                    <option value="tecnico">Técnico</option>
                                    <option value="usuario">Usuario Final</option>
                                </select>
                            </div>

                            <button type="submit" class="btn btn-custom w-100 btn-lg">
                                <i class="bi bi-check-circle me-2"></i>Registrar Usuario
                            </button>
                        </form>

                        <div id="respuesta" class="mt-3" style="display: none;"></div>

                        <hr class="my-4">

                        <div class="text-center">
                            <a href="login.html" class="btn btn-outline-primary me-2">
                                <i class="bi bi-box-arrow-in-right me-1"></i>Iniciar Sesión
                            </a>
                            <a href="usuarios.html" class="btn btn-outline-secondary">
                                <i class="bi bi-list me-1"></i>Ver Usuarios
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/usuarios.js"></script>
</body>
</html>
