<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Iniciar Sesión - Whaticket</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#1e3a8a,#3b82f6,#60a5fa);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Segoe UI;
}

.card-login{
width:420px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<div class="card card-login">

<div class="card-header text-center bg-primary text-white">

<h4>Iniciar Sesión</h4>
<p class="mb-0">Sistema Whaticket</p>

</div>

<div class="card-body">

<form id="formLogin">

<div class="mb-3">

<label>Correo</label>

<input
type="email"
class="form-control"
id="correo"
required
>

</div>

<div class="mb-3">

<label>Contraseña</label>

<input
type="password"
class="form-control"
id="password"
required
>

</div>

<div class="mb-3">

<label>Rol</label>

<select
class="form-control"
id="rol"
required
>

<option value="">Seleccione</option>
<option value="admin">Administrador</option>
<option value="tecnico">Técnico</option>
<option value="usuario">Usuario</option>

</select>

</div>

<button
type="submit"
class="btn btn-primary w-100"
>

Iniciar sesión

</button>

</form>

<div
id="respuesta"
class="alert mt-3"
style="display:none"
></div>

</div>

</div>

<script>

document.getElementById("formLogin").addEventListener("submit", async (e)=>{

e.preventDefault()

const correo=document.getElementById("correo").value
const password=document.getElementById("password").value
const rol=document.getElementById("rol").value

const respuesta=document.getElementById("respuesta")

try{

let res=await fetch("../../backend/login.php",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
correo,
password,
rol
})

})

let data=await res.json()

if(data.ok){

if(data.rol==="admin"){
window.location.href="../admin/index.html"
}

else if(data.rol==="tecnico"){
window.location.href="../tecnico/index.html"
}

else{
window.location.href="../usuario/index.html"
}

}

else{

respuesta.style.display="block"
respuesta.className="alert alert-danger"
respuesta.textContent=data.mensaje

}

}catch(error){

respuesta.style.display="block"
respuesta.className="alert alert-danger"
respuesta.textContent="Error de conexión con el servidor"

}

})

</script>

</body>
</html>
