<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Usuarios</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-5">

<h2>Lista de Usuarios</h2>

<table class="table table-bordered">

<thead class="table-dark">
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Correo</th>
<th>Rol</th>
<th>Estado</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tablaUsuarios"></tbody>

</table>

<a href="index.html" class="btn btn-primary">Registrar usuario</a>

<!-- MODAL EDITAR -->

<div class="modal fade" id="modalEditar">

<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">Editar Usuario</h5>
</div>

<div class="modal-body">

<input type="hidden" id="edit_id">

<div class="mb-2">
<label>Nombre</label>
<input type="text" id="edit_nombre" class="form-control">
</div>

<div class="mb-2">
<label>Correo</label>
<input type="email" id="edit_correo" class="form-control">
</div>

<div class="mb-2">
<label>Rol</label>

<select id="edit_rol" class="form-control">
<option value="admin">Administrador</option>
<option value="tecnico">Técnico</option>
<option value="usuario">Usuario</option>
</select>

</div>

</div>

<div class="modal-footer">

<button class="btn btn-danger" onclick="eliminarUsuario()">Eliminar</button>

<button class="btn btn-success" onclick="guardarEdicion()">Guardar cambios</button>

</div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/usuarios.js"></script>

</body>
</html>
